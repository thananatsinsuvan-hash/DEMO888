name = "care-billing-api"
main = "src/index.js"
compatibility_date = "2024-11-01"

# ผูก D1 database เข้ากับ Worker (ตัวแปรในโค้ดคือ env.DB)
[[d1_databases]]
binding = "DB"
database_name = "care-billing-db"
database_id = "68231159-77f9-4275-8512-af071c290d63"

# ผูก R2 bucket เข้ากับ Worker สำหรับเก็บรูปคนไข้ (ตัวแปรในโค้ดคือ env.PHOTOS)
# ต้องสร้าง bucket ก่อนด้วยคำสั่ง: wrangler r2 bucket create care-billing-photos
[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "care-billing-photos"

# เสิร์ฟไฟล์หน้าเว็บ (public/index.html) ไปพร้อมกับ Worker เดียวกัน
[assets]
directory = "./public"
binding = "ASSETS"
